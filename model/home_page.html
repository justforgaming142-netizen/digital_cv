<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:           #111a0e;
    --bg2:          #141f11;
    --bg3:          #192614;
    --green:        #5a9e6f;
    --green-dim:    #3d7a52;
    --green-bright: #7dc495;
    --border:       rgba(90,158,111,0.14);
    --border-h:     rgba(90,158,111,0.32);
    --cream:        #d4c9b0;
    --cream-dim:    #7a7468;
    --cream-faint:  #2e2c28;
    --amber:        #c8932a;
    --blue:         #5b8db8;
    --red:          #b85a45;
    --purple:       #9b7bc0;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-snap-type: y mandatory; overflow-y: scroll; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
  }

  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none; z-index:0; opacity:.6;
  }

  /* ── HERO ── */
  .hero {
    position:relative; z-index:1;
    height:100vh;
    scroll-snap-align:start;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
  }

  #clock {
    font-family:'DM Serif Display',serif;
    font-size:104px;
    line-height:1;
    color:var(--cream);
    letter-spacing:-4px;
    animation:fadeUp .8s ease both;
  }

  #date {
    font-family:'DM Mono',monospace;
    font-size:12px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--green);
    margin-top:12px;
    margin-bottom:50px;
    opacity:.75;
    animation:fadeUp .8s .08s ease both;
  }

  .search-wrap {
    display:flex;
    align-items:center;
    width:480px;
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:3px;
    padding:0 18px;
    gap:12px;
    transition:border-color .2s;
    animation:fadeUp .8s .16s ease both;
  }
  .search-wrap:focus-within { border-color:var(--green-dim); }

  .search-icon {
    font-family:'DM Mono',monospace;
    font-size:13px;
    color:var(--green-dim);
    flex-shrink:0;
  }

  #search {
    flex:1;
    background:none; border:none; outline:none;
    color:var(--cream);
    font-family:'DM Sans',sans-serif;
    font-size:15px;
    padding:15px 0;
    caret-color:var(--green);
  }
  #search::placeholder { color:var(--cream-dim); }

  .bookmarks-wrap {
    margin-top:38px;
    animation:fadeUp .8s .24s ease both;
  }

  .bm-label {
    font-family:'DM Mono',monospace;
    font-size:10px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--green-dim);
    text-align:center;
    margin-bottom:14px;
    opacity:.65;
  }

  .bookmarks {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
    max-width:540px;
  }

  .bookmark {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:7px;
    padding:13px 18px;
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:3px;
    text-decoration:none;
    color:var(--cream-dim);
    font-size:11px;
    font-family:'DM Mono',monospace;
    transition:all .15s;
    min-width:72px;
  }
  .bookmark:hover {
    border-color:var(--border-h);
    color:var(--cream);
    background:var(--bg2);
  }
  .bicon { font-size:16px; color:var(--green-dim); transition:color .15s; }
  .bookmark:hover .bicon { color:var(--green); }

  .scroll-hint {
    position:absolute;
    bottom:28px; left:50%;
    transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:7px;
    cursor:pointer;
    opacity:.28;
    transition:opacity .2s;
    animation:fadeUp .8s .5s ease both;
  }
  .scroll-hint:hover { opacity:.6; }
  .scroll-hint span {
    font-family:'DM Mono',monospace;
    font-size:10px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:var(--green);
  }
  .scroll-arrow {
    width:14px; height:14px;
    border-right:1px solid var(--green);
    border-bottom:1px solid var(--green);
    transform:rotate(45deg);
    animation:bounce 1.8s ease-in-out infinite;
  }

  /* ── FEED ── */
  .feed-section {
    position:relative; z-index:1;
    height:100vh;
    scroll-snap-align:start;
    display:flex;
    flex-direction:column;
    background:var(--bg2);
    border-top:1px solid var(--border);
  }

  .feed-header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 30px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }

  .feed-tabs { display:flex; gap:2px; }

  .tab {
    font-family:'DM Mono',monospace;
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    padding:5px 13px;
    border-radius:2px;
    cursor:pointer;
    color:var(--cream-dim);
    border:1px solid transparent;
    background:none;
    transition:all .15s;
  }
  .tab:hover { color:var(--cream); }
  .tab.active { color:var(--green); border-color:var(--border); background:var(--bg3); }

  .feed-actions { display:flex; align-items:center; gap:12px; }

  .feed-refresh {
    font-family:'DM Mono',monospace;
    font-size:11px;
    color:var(--cream-faint);
    background:none; border:none;
    cursor:pointer; transition:color .15s; padding:4px;
  }
  .feed-refresh:hover { color:var(--green); }

  .feed-back {
    font-family:'DM Mono',monospace;
    font-size:11px;
    color:var(--cream-dim);
    background:none;
    border:1px solid var(--border);
    border-radius:2px;
    cursor:pointer;
    padding:4px 11px;
    transition:all .15s;
  }
  .feed-back:hover { color:var(--cream); border-color:var(--border-h); }

  .feed-columns {
    flex:1;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    overflow:hidden;
  }

  .feed-col {
    overflow-y:auto;
    border-right:1px solid var(--border);
    scrollbar-width:thin;
    scrollbar-color:var(--cream-faint) transparent;
  }
  .feed-col:last-child { border-right:none; }
  .feed-col::-webkit-scrollbar { width:2px; }
  .feed-col::-webkit-scrollbar-thumb { background:var(--cream-faint); }

  .col-header {
    position:sticky; top:0;
    background:var(--bg2);
    padding:11px 22px;
    border-bottom:1px solid var(--border);
    font-family:'DM Mono',monospace;
    font-size:10px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--green-dim);
    z-index:2;
  }

  .feed-item {
    padding:15px 22px;
    border-bottom:1px solid var(--border);
    text-decoration:none;
    display:block;
    transition:background .12s;
  }
  .feed-item:hover { background:var(--bg3); }

  .feed-source {
    font-family:'DM Mono',monospace;
    font-size:10px;
    letter-spacing:.12em;
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .src-hn    { color:var(--amber); }
  .src-linux { color:var(--blue); }
  .src-hindu { color:var(--red); }
  .src-gfg   { color:var(--green); }
  .src-eco   { color:var(--purple); }

  .feed-title {
    font-family:'DM Sans',sans-serif;
    font-size:14px;
    color:var(--cream);
    line-height:1.55;
    margin-bottom:5px;
  }

  .feed-meta {
    font-family:'DM Mono',monospace;
    font-size:11px;
    color:var(--cream-dim);
  }

  .feed-loading {
    padding:32px 22px;
    font-family:'DM Mono',monospace;
    font-size:12px;
    color:var(--cream-dim);
    text-align:center;
  }

  .feed-error {
    padding:18px 22px;
    font-family:'DM Mono',monospace;
    font-size:11px;
    color:var(--cream-dim);
    border-left:2px solid var(--cream-faint);
    margin:12px 18px;
    line-height:1.8;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:none; }
  }
  @keyframes bounce {
    0%,100% { transform:rotate(45deg) translateY(0); }
    50%      { transform:rotate(45deg) translateY(5px); }
  }
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div id="clock">00:00</div>
  <div id="date">loading...</div>

  <div class="search-wrap">
    <span class="search-icon">/&gt;</span>
    <input id="search" type="text" placeholder="search duckduckgo..." autocomplete="off" spellcheck="false">
  </div>

  <div class="bookmarks-wrap">
    <div class="bm-label">quick links</div>
    <div class="bookmarks">
      <a class="bookmark" href="https://github.com"><span class="bicon">⌥</span>GitHub</a>
      <a class="bookmark" href="https://claude.ai"><span class="bicon">✦</span>Claude</a>
      <a class="bookmark" href="https://www.youtube.com"><span class="bicon">▶</span>YouTube</a>
      <a class="bookmark" href="https://leetcode.com"><span class="bicon">λ</span>LeetCode</a>
      <a class="bookmark" href="https://duckduckgo.com"><span class="bicon">◎</span>DDG</a>
      <a class="bookmark" href="https://web.whatsapp.com"><span class="bicon">◈</span>WhatsApp</a>
      <a class="bookmark" href="https://fedoraproject.org"><span class="bicon">◉</span>Fedora</a>
      <a class="bookmark" href="https://www.geeksforgeeks.org"><span class="bicon">∑</span>GFG</a>
    </div>
  </div>

  <div class="scroll-hint" onclick="document.querySelector('.feed-section').scrollIntoView({behavior:'smooth'})">
    <span>feeds</span>
    <div class="scroll-arrow"></div>
  </div>
</section>

<!-- FEED -->
<section class="feed-section">
  <div class="feed-header">
    <div class="feed-tabs">
      <button class="tab active" onclick="switchTab(this,'all')">All</button>
      <button class="tab" onclick="switchTab(this,'tech')">Tech</button>
      <button class="tab" onclick="switchTab(this,'india')">India</button>
      <button class="tab" onclick="switchTab(this,'linux')">Linux</button>
    </div>
    <div class="feed-actions">
      <button class="feed-refresh" onclick="loadFeeds()">↻ refresh</button>
      <button class="feed-back" onclick="document.querySelector('.hero').scrollIntoView({behavior:'smooth'})">↑ home</button>
    </div>
  </div>
  <div class="feed-columns" id="feed-columns">
    <div class="feed-col"><div class="feed-loading">fetching...</div></div>
    <div class="feed-col"></div>
    <div class="feed-col"></div>
  </div>
</section>

<script>
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('date').textContent =
    days[now.getDay()] + ' · ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
}
updateClock(); setInterval(updateClock, 1000);

document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = e.target.value.trim();
    if (q) window.location.href = 'https://duckduckgo.com/?q=' + encodeURIComponent(q);
  }
});

const SOURCES = [
  { label:'HN',             cls:'src-hn',    tag:'tech',  col:0, url:'https://api.rss2json.com/v1/api.json?rss_url=https://hnrss.org/frontpage&count=15' },
  { label:'GFG',            cls:'src-gfg',   tag:'tech',  col:0, url:'https://api.rss2json.com/v1/api.json?rss_url=https://www.geeksforgeeks.org/feed/&count=10' },
  { label:'r/linux',        cls:'src-linux', tag:'linux', col:1, url:'https://api.rss2json.com/v1/api.json?rss_url=https://www.reddit.com/r/linux/.rss&count=14' },
  { label:'The Hindu',      cls:'src-hindu', tag:'india', col:2, url:'https://api.rss2json.com/v1/api.json?rss_url=https://www.thehindu.com/feeder/default.rss&count=10' },
  { label:'Economic Times', cls:'src-eco',   tag:'india', col:2, url:'https://api.rss2json.com/v1/api.json?rss_url=https://economictimes.indiatimes.com/markets/rssfeeds/1977021501.cms&count=10' }
];
const COL_LABELS = ['Tech & Dev','Linux','India & Economy'];
let allItems = []; let currentTab = 'all';

function timeAgo(d) {
  const diff = Math.floor((Date.now()-new Date(d))/60000);
  if(diff<1) return 'just now';
  if(diff<60) return diff+'m ago';
  if(diff<1440) return Math.floor(diff/60)+'h ago';
  return Math.floor(diff/1440)+'d ago';
}

function renderFeed() {
  const container = document.getElementById('feed-columns');
  const items = currentTab==='all' ? allItems : allItems.filter(i=>i.tag===currentTab);
  if(!items.length){
    container.innerHTML='<div class="feed-col"><div class="feed-loading">no items</div></div><div class="feed-col"></div><div class="feed-col"></div>';
    return;
  }
  if(currentTab==='all'){
    const cols=[[],[],[]];
    items.forEach(i=>cols[i.col].push(i));
    container.innerHTML=cols.map((col,ci)=>`
      <div class="feed-col">
        <div class="col-header">${COL_LABELS[ci]}</div>
        ${col.map(item=>`
          <a class="feed-item" href="${item.link}" target="_blank" rel="noopener">
            <div class="feed-source ${item.cls}">${item.label}</div>
            <div class="feed-title">${item.title}</div>
            <div class="feed-meta">${item.pubDate?timeAgo(item.pubDate):''}</div>
          </a>`).join('')}
      </div>`).join('');
  } else {
    container.innerHTML=`
      <div class="feed-col" style="grid-column:1/-1;border-right:none">
        ${items.map(item=>`
          <a class="feed-item" href="${item.link}" target="_blank" rel="noopener">
            <div class="feed-source ${item.cls}">${item.label}</div>
            <div class="feed-title">${item.title}</div>
            <div class="feed-meta">${item.pubDate?timeAgo(item.pubDate):''}</div>
          </a>`).join('')}
      </div>`;
  }
}

async function fetchSource(src){
  try{
    const res=await fetch(src.url);
    const data=await res.json();
    if(data.items) return data.items.map(i=>({
      label:src.label,cls:src.cls,tag:src.tag,col:src.col,
      title:i.title,link:i.link,pubDate:i.pubDate
    }));
  }catch(e){}
  return [];
}

async function loadFeeds(){
  document.getElementById('feed-columns').innerHTML=
    '<div class="feed-col"><div class="feed-loading">fetching feeds...</div></div><div class="feed-col"></div><div class="feed-col"></div>';
  allItems=[];
  const results=await Promise.allSettled(SOURCES.map(fetchSource));
  results.forEach(r=>{if(r.status==='fulfilled') allItems.push(...r.value);});
  if(!allItems.length){
    document.getElementById('feed-columns').innerHTML=`
      <div class="feed-col" style="grid-column:1/-1">
        <div class="feed-error">
          Could not load feeds — CORS restriction in Firefox.<br><br>
          Install the <strong>Feedbro</strong> extension to fix this.<br><br>
          Clock, search and bookmarks work offline.
        </div>
      </div>`;
    return;
  }
  renderFeed();
}

function switchTab(el,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active'); currentTab=tab; renderFeed();
}

loadFeeds();
</script>
</body>
</html>
